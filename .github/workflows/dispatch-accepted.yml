name: Dispatch accepted submission

on:
  issues:
    types:
      - labeled

permissions:
  contents: read
  issues: read

jobs:
  dispatch:
    if: github.event.label.name == 'accepted' && contains(github.event.issue.labels.*.name, 'submission')
    runs-on: ubuntu-latest

    steps:
      - name: Verify actor can accept submissions
        env:
          GH_TOKEN: ${{ github.token }}
          ACTOR: ${{ github.actor }}
          REPOSITORY: ${{ github.repository }}
        run: |
          ROLE="$(gh api "repos/${REPOSITORY}/collaborators/${ACTOR}/permission" --jq '.role_name' 2>/dev/null || true)"

          echo "Actor: ${ACTOR}"
          echo "Repository role: ${ROLE}"

          case "$ROLE" in
            admin|maintain)
              echo "Accepted by authorized actor."
              ;;
            *)
              echo "::error::User ${ACTOR} is not allowed to accept submissions. Required role: write, maintain, or admin."
              exit 1
              ;;
          esac

      - name: Dispatch import workflow
        env:
          GH_TOKEN: ${{ secrets.PIPELINE_DISPATCH_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          gh api repos/SilentDevelopment/heads-pipeline/dispatches \
            --method POST \
            --field event_type=accepted-head-submission \
            --raw-field client_payload="{\"issue_number\":${ISSUE_NUMBER},\"issue_url\":\"${ISSUE_URL}\",\"issue_title\":\"${ISSUE_TITLE}\",\"submissions_repository\":\"${{ github.repository }}\"}"
